tavily_queries:
  # Firms without public ATS boards (NYC / US)
  - 'Citadel OR "Citadel Securities" ("machine learning" OR "AI engineer" OR "research engineer") (NYC OR "New York") job 2026'
  - '"Two Sigma" OR "D.E. Shaw" OR Millennium ("machine learning" OR "ML engineer" OR "quant researcher") (NYC OR "New York") hiring'
  - 'Bloomberg OR BlackRock OR "Goldman Sachs" OR "JPMorgan" ("AI engineer" OR "ML engineer" OR "knowledge graph" OR agentic) (NYC OR "New York") job'
  - 'Balyasny OR Bridgewater OR "Hudson River Trading" OR Susquehanna ("machine learning" OR "AI research") (NYC OR "New York") careers'
  # Role-shaped long tail matching agentic + knowledge systems in finance
  - '"knowledge graph" OR "enterprise knowledge" OR RAG (engineer OR researcher) (fintech OR "hedge fund" OR "asset management") (NYC OR "New York") job'
  - '"agentic" OR "multi-agent" OR "AI platform" engineer (finance OR fintech OR "investment management") (NYC OR "New York" OR remote US) hiring 2026'
  - '"AI Engineering Enablement" OR "Developer Advocate" OR "Developer Advocacy" AI (finance OR trading OR "hedge fund" OR Optiver OR Citadel) (NYC OR "New York" OR Chicago) job'
  # --- Banks & asset managers (Workday-hosted; no public ATS API) ---
  - 'BlackRock ("AI engineer" OR "machine learning" OR "Aladdin" OR "generative AI" OR agentic) ("New York" OR NYC) careers 2026'
  - '"Morgan Stanley" OR "Goldman Sachs" OR "JPMorgan" ("machine learning engineer" OR "AI engineer" OR "applied AI" OR "GenAI") ("New York" OR NYC) job 2026'
  - '"Bank of America" OR Citi OR "Wells Fargo" OR "Deutsche Bank" ("AI engineer" OR "machine learning" OR "LLM" OR agentic) ("New York" OR NYC) hiring'
  - 'Fidelity OR "Capital Group" OR PIMCO OR Wellington OR "State Street" ("AI engineer" OR "machine learning engineer" OR "GenAI") ("New York" OR "New Jersey" OR remote US) job'
  # --- Private equity / VC (large brands on Workday or bespoke portals) ---
  - 'Blackstone OR KKR OR "Apollo Global" OR Carlyle OR "TPG" ("AI engineer" OR "machine learning" OR "data science" OR "generative AI") ("New York" OR NYC) careers 2026'
  - '"Insight Partners" OR "Thrive Capital" OR Coatue OR "Tiger Global" OR "Vista Equity" ("AI engineer" OR "machine learning" OR "applied AI" OR "platform engineer") ("New York" OR NYC) job'
  - '(venture capital OR "private equity" OR "growth equity") "AI engineer" OR "machine learning" OR "AI platform" (portfolio OR "in-house") ("New York" OR NYC) hiring 2026'
